{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center">All Products</h2>
    <div class="row">
        {% for p in products %}
        <div class="col-md-4">
            <div class="card p-3 m-2">
                <img src="{{ p.img_url }}" style="width:100%; height:200px; object-fit:cover;">
                <h3>{{ p.title }}</h3>
             
             <p>ფასი: {{ p.price }}</p> 
             <p>ავტორი: {{ p.admin_id }}</p>
                <!-- ადმინის ლოგიკა: წაშლის ღილაკი მხოლოდ ადმინს გამოუჩნდება -->
                {% if current_user.is_admin %}
                    <a href="{{ url_for('delete_product', product_id=p.id) }}" class="btn btn-danger">Delete</a>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
